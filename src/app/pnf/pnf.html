<div class="container">
  <div class="error-content">
    <div class="error-icon">
      🍳
    </div>
    
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Recipe Not Found!</h2>
    
    <p class="error-message">
      Oops! It looks like you took a wrong turn in the kitchen. 
      The recipe you're looking for has gone missing.
    </p>
    
    
    <div class="action-buttons">
      @if (role == "user") {
        <a routerLink="/" class="btn btn-primary">
        Return to Home
      </a>
      }
      @else {
        <a routerLink="/admin" class="btn btn-primary">
        Return to Home
      </a>
      }
      
    </div>
    
    <div class="cooking-tip">
      <p><strong>Chef's Tip:</strong> Every great chef starts by following the right recipe. Let us help you find yours! 👨‍🍳</p>
    </div>
  </div>
</div>
